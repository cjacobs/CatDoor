; https://docs.platformio.org/page/projectconf.html

[env:esp32-DevKitC]
platform = espressif32
board = rymcu-esp32-devkitc
framework = arduino
lib_deps = 
	adafruit/Adafruit PN532@^1.3.4
	adafruit/Adafruit SSD1306@^2.5.16
test_ignore = test_state_machine


